<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A148C"/>
      <stop offset="100%" stop-color="#1A0033"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="300" height="450" rx="15" fill="url(#bgGrad)"/>
  <!-- Decorative Ring -->
  <circle cx="150" cy="200" r="95" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="12"/>
  <!-- Magic Icon (Harry Potter glasses and lightning scar) -->
  <g transform="translate(150, 185)" stroke="#FFD700" stroke-width="4" fill="none">
    <!-- Glasses -->
    <circle cx="-25" cy="10" r="20"/>
    <circle cx="25" cy="10" r="20"/>
    <path d="M -5 10 Q 0 5, 5 10"/>
    <!-- Lightning Scar -->
    <path d="M -5 -40 L -20 -15 L -8 -15 L -23 10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <!-- Text -->
  <text x="150" y="340" font-family="'Segoe UI', Roboto, sans-serif" font-weight="bold" font-size="28" fill="#FFFFFF" text-anchor="middle">HARRY POTTER</text>
  <text x="150" y="375" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)" text-anchor="middle">J.K. Rowling</text>
  <rect x="110" y="395" width="80" height="2" fill="#FFD700"/>
</svg>
