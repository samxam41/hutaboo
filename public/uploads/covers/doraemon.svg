<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A90E2"/>
      <stop offset="100%" stop-color="#1F3B68"/>
    </linearGradient>
    <linearGradient id="bellGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF200"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="300" height="450" rx="15" fill="url(#bgGrad)"/>
  <!-- Decorative Ring/Patterns -->
  <circle cx="150" cy="200" r="100" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="15"/>
  <circle cx="150" cy="200" r="80" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="10"/>
  <!-- Bell Icon (Mèo máy) -->
  <g transform="translate(150, 180)">
    <circle cx="0" cy="0" r="30" fill="url(#bellGrad)"/>
    <rect x="-35" y="-5" width="70" height="8" rx="4" fill="#E11E26"/>
    <rect x="-25" y="3" width="50" height="4" rx="2" fill="#333"/>
    <circle cx="0" cy="12" r="6" fill="#333"/>
    <line x1="0" y1="18" x2="0" y2="30" stroke="#333" stroke-width="4"/>
  </g>
  <!-- Text -->
  <text x="150" y="340" font-family="'Segoe UI', Roboto, sans-serif" font-weight="bold" font-size="28" fill="#FFFFFF" text-anchor="middle">DORAEMON</text>
  <text x="150" y="375" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)" text-anchor="middle">Fujiko F. Fujio</text>
  <rect x="110" y="395" width="80" height="2" fill="#E11E26"/>
</svg>
