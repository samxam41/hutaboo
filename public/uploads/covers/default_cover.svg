<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2c3e50"/>
      <stop offset="100%" stop-color="#0f171e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="300" height="450" rx="15" fill="url(#bgGrad)"/>
  <!-- Decorative Ring -->
  <circle cx="150" cy="200" r="95" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="12"/>
  <!-- Minimalist Book Icon -->
  <g transform="translate(150, 185)" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="4">
    <path d="M -30 -30 L 30 -30 L 30 30 L -30 30 Z"/>
    <path d="M -20 -20 L 20 -20"/>
    <path d="M -20 -10 L 20 -10"/>
    <path d="M -20 0 L 10 0"/>
  </g>
  <!-- Text -->
  <text x="150" y="340" font-family="'Segoe UI', Roboto, sans-serif" font-weight="bold" font-size="22" fill="#FFFFFF" text-anchor="middle" fill-opacity="0.8">TÁC PHẨM</text>
  <text x="150" y="375" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)" text-anchor="middle">HuTaBoo</text>
</svg>
