<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HuTaBoo - Khám Phá Sách</title>
  <!-- SEO Meta Tags -->
  <meta name="description" content="Khám phá kho tàng sách của HuTaBoo hoàn chỉnh với Electron, Express và MySQL.">
  
  <!-- Font và Icon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Hộp Chứa Toast Thông Báo Nhanh -->
  <div id="toast-container" class="toast-container"></div>

  <!-- SIDEBAR MENU (SLIDE-OUT) -->
  <div class="sidebar-overlay" id="sidebar-menu">
    <div class="sidebar-content">
      <button class="close-sidebar-btn" id="close-sidebar-btn">
        <i class="fa-solid fa-xmark"></i>
      </button>
      
      <h2 class="sidebar-title">HuTaBoo</h2>
      <p style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 1rem;">Khám phá tri thức Việt</p>
      
      <div class="sidebar-divider"></div>
      
      <div class="sidebar-menu-item category-toggle" id="sidebar-category-toggle">
        <span><i class="fa-solid fa-masks-theater"></i> Thể loại sách</span>
        <i class="fa-solid fa-chevron-right" id="sidebar-chevron"></i>
      </div>
      
      <div class="sidebar-categories" id="sidebar-categories-container">
        <!-- Được chèn động qua JS -->
      </div>
      
      <div class="sidebar-menu-item" onclick="showToast('HuTaBoo v2.0 - Electron Desktop App')">
        <span><i class="fa-solid fa-circle-info"></i> Phiên bản</span>
      </div>
    </div>
  </div>

  <!-- NAVIGATION HEADER -->
  <header>
    <div class="nav-container">
      <div class="nav-left">
        <button class="menu-trigger-btn" id="open-sidebar-btn">
          <i class="fa-solid fa-bars"></i>
        </button>
        <a href="discover.html" class="logo" id="logo-btn">
          <i class="fa-solid fa-book-open"></i> HuTaBoo
        </a>
      </div>

      <!-- Tabs chuyển đổi giữa Khám phá Sách và Feed Review -->
      <div class="nav-tabs">
        <a href="discover.html" class="nav-tab-btn active" id="tab-btn-explorer">
          <i class="fa-solid fa-compass"></i> Khám phá sách
        </a>
        <a href="reviews.html" class="nav-tab-btn" id="tab-btn-reviews">
          <i class="fa-regular fa-star"></i> Đánh giá mới nhất
        </a>
      </div>
      
      <!-- Khối điều khiển Xác thực -->
      <div class="auth-buttons" id="auth-header-container">
        <button class="btn btn-secondary" id="open-auth-btn">
          <i class="fa-solid fa-user-lock"></i> Đăng nhập
        </button>
      </div>
    </div>
  </header>

  <!-- MAIN CONTAINER -->
  <main>
    <!-- THANH TÌM KIẾM SÁCH (BOOK SEARCH) -->
    <div class="search-container">
      <input type="text" id="book-search-input" class="form-control search-input" placeholder="🔍 Tìm kiếm tác phẩm, tác giả hoặc thể loại...">
    </div>

    <!-- BANNER SLIDER SÁCH NỔI BẬT -->
    <div class="featured-slider-wrapper" id="featured-slider-wrapper">
      <!-- Sẽ render động nội dung slider qua JS -->
    </div>

    <!-- THANH CÔNG CỤ & BỘ LỌC CHỦ ĐỀ -->
    <div class="toolbar">
      <div class="toolbar-left">
        <!-- Nút chuyển đổi Grid/List cho Khám Phá Sách -->
        <button class="view-toggle-btn" id="view-toggle-btn">
          <i class="fa-solid fa-table-cells-large"></i> <span>Chế độ Lưới (Grid)</span>
        </button>
      </div>
    </div>

    <!-- TAB 1: KHÁM PHÁ SÁCH (GRID/LIST) -->
    <div class="tab-view active" id="view-explorer">
      <div class="books-container grid" id="books-list-container">
        <!-- Render sách qua JS -->
      </div>
    </div>
  </main>

  <!-- ==========================================
       1. MODAL ĐĂNG NHẬP / ĐĂNG KÝ (AUTH)
       ========================================== -->
  <div class="modal-overlay" id="auth-modal">
    <div class="modal-content">
      <div class="auth-tabs">
        <div class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Đăng nhập</div>
        <div class="auth-tab" id="tab-register" onclick="switchAuthTab('register')">Đăng ký tài khoản</div>
      </div>
      
      <div class="modal-body">
        <div class="form-alert danger" id="auth-error-alert">
          <i class="fa-solid fa-triangle-exclamation"></i>
          <span id="auth-error-msg"></span>
        </div>

        <form id="auth-form" onsubmit="handleAuthSubmit(event)">
          <div class="form-group">
            <label class="form-label" for="auth-username">Tên đăng nhập</label>
            <input type="text" id="auth-username" class="form-control" placeholder="Nhập tên đăng nhập..." required autocomplete="username">
          </div>
          
          <div class="form-group">
            <label class="form-label" for="auth-password">Mật khẩu</label>
            <input type="password" id="auth-password" class="form-control" placeholder="Nhập mật khẩu..." required autocomplete="current-password">
          </div>
          
          <button type="submit" class="btn btn-primary form-submit-btn" id="auth-submit-btn">
            Đăng nhập
          </button>
          
          <button type="button" class="btn btn-text form-submit-btn" id="close-auth-modal-btn">
            Hủy bỏ
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- ==========================================
       2. MODAL CHI TIẾT BÀI REVIEW (READ-ONLY)
       ========================================== -->
  <div class="modal-overlay" id="detail-modal">
    <div class="modal-content large">
      <div class="modal-header">
        <h3 class="modal-title">Chi tiết bài Review</h3>
        <button class="close-modal-btn" id="close-detail-modal-x">&times;</button>
      </div>
      <div class="modal-body">
        <!-- Chi tiết Review -->
        <div class="detail-review-full" id="detail-review-container">
          <!-- Chèn động thông tin bài review -->
        </div>

        <!-- Section Bình Luận (Chỉ đọc) -->
        <div class="comments-section">
          <h4 class="comments-title">
            <i class="fa-regular fa-comments"></i> Bình luận cộng đồng
          </h4>
          
          <!-- Danh sách bình luận -->
          <div class="comment-list" id="comments-list-container">
            <!-- Chèn động comments -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ==========================================
       3. MODAL CHI TIẾT SÁCH (BOOK DETAIL & REVIEWS LIST)
       ========================================== -->
  <div class="modal-overlay" id="book-detail-modal">
    <div class="modal-content large">
      <div class="modal-header">
        <h3 class="modal-title">Thông tin tác phẩm</h3>
        <button class="close-modal-btn" id="close-book-detail-x">&times;</button>
      </div>
      <div class="modal-body">
        <div class="book-detail-wrapper" id="book-detail-info-wrapper">
          <!-- Render thông tin chi tiết sách -->
        </div>
        
        <!-- Danh sách các bài review của riêng cuốn sách này -->
        <div class="book-detail-reviews-section">
          <div class="book-detail-reviews-title">
            <span><i class="fa-solid fa-quote-left"></i> Đánh giá từ độc giả</span>
          </div>
          
          <div class="book-detail-reviews-list" id="book-detail-reviews-list-container">
            <!-- Chèn các review tương ứng của sách -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- NẠP THƯ VIỆN CUSTOM HOOKS -->
  <script src="js/useAuth.js"></script>
  <script src="js/useBooks.js"></script>
  <script src="js/useReviews.js"></script>
  <script src="js/useModal.js"></script>
  
  <!-- NẠP LOGIC HỆ THỐNG GIAO DIỆN CHÍNH -->
  <script src="js/common.js"></script>
  <script src="js/discover.js"></script>
</body>
</html>
