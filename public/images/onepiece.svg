<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E11E26"/>
      <stop offset="100%" stop-color="#500709"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="300" height="450" rx="15" fill="url(#bgGrad)"/>
  <!-- Decorative Ring -->
  <circle cx="150" cy="200" r="95" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="12"/>
  <circle cx="150" cy="200" r="75" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="8"/>
  <!-- Straw Hat Icon -->
  <g transform="translate(150, 195)">
    <!-- Hat Crown -->
    <path d="M -40 0 C -40 -45, 40 -45, 40 0 Z" fill="#F4D03F"/>
    <!-- Red ribbon -->
    <path d="M -40 -5 C -40 -15, 40 -15, 40 -5 Z" fill="#E11E26"/>
    <!-- Hat Brim -->
    <ellipse cx="0" cy="3" rx="60" ry="12" fill="#F4D03F"/>
    <ellipse cx="0" cy="3" rx="60" ry="12" fill="none" stroke="#D4AC0D" stroke-width="2"/>
  </g>
  <!-- Text -->
  <text x="150" y="340" font-family="'Segoe UI', Roboto, sans-serif" font-weight="bold" font-size="28" fill="#FFFFFF" text-anchor="middle">ONE PIECE</text>
  <text x="150" y="375" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)" text-anchor="middle">Eiichiro Oda</text>
  <rect x="110" y="395" width="80" height="2" fill="#F4D03F"/>
</svg>
