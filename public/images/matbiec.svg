<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#0A2F1D"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="300" height="450" rx="15" fill="url(#bgGrad)"/>
  <!-- Decorative Ring -->
  <circle cx="150" cy="200" r="95" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="12"/>
  <!-- Eye/Nature Design (Mắt Biếc) -->
  <g transform="translate(150, 185)">
    <!-- Eye Shape outline -->
    <path d="M -60 0 C -20 -40, 20 -40, 60 0 C 20 40, -20 40, -60 0 Z" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-opacity="0.8"/>
    <!-- Blue/Teal Iris -->
    <circle cx="0" cy="0" r="22" fill="#00E5FF" fill-opacity="0.4"/>
    <circle cx="0" cy="0" r="18" fill="#00B0FF" fill-opacity="0.6"/>
    <circle cx="0" cy="0" r="8" fill="#FFFFFF"/>
    <!-- Cute forest tree elements in eye -->
    <path d="M -40 0 L -30 -15 L -20 0 Z" fill="#FFFFFF" fill-opacity="0.3"/>
    <path d="M 20 0 L 30 -15 L 40 0 Z" fill="#FFFFFF" fill-opacity="0.3"/>
  </g>
  <!-- Text -->
  <text x="150" y="340" font-family="'Segoe UI', Roboto, sans-serif" font-weight="bold" font-size="28" fill="#FFFFFF" text-anchor="middle">MẮT BIẾC</text>
  <text x="150" y="375" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)" text-anchor="middle">Nguyễn Nhật Ánh</text>
  <rect x="110" y="395" width="80" height="2" fill="#00E5FF"/>
</svg>
