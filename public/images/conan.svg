<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#37474F"/>
      <stop offset="100%" stop-color="#10171A"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="300" height="450" rx="15" fill="url(#bgGrad)"/>
  <!-- Decorative Ring -->
  <circle cx="150" cy="200" r="95" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="12"/>
  <!-- Detective Bowtie and Glasses (Conan) -->
  <g transform="translate(150, 185)">
    <!-- Red Bowtie -->
    <path d="M -35 -20 L -5 -5 L -5 -35 Z" fill="#E11E26"/>
    <path d="M 35 -20 L 5 -5 L 5 -35 Z" fill="#E11E26"/>
    <circle cx="0" cy="-20" r="8" fill="#B71C1C"/>
    <!-- Magnifying Glass -->
    <circle cx="0" cy="20" r="16" fill="none" stroke="#FFFFFF" stroke-width="4"/>
    <line x1="11" y1="31" x2="25" y2="45" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
  </g>
  <!-- Text -->
  <text x="150" y="340" font-family="'Segoe UI', Roboto, sans-serif" font-weight="bold" font-size="28" fill="#FFFFFF" text-anchor="middle">CONAN</text>
  <text x="150" y="375" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)" text-anchor="middle">Gosho Aoyama</text>
  <rect x="110" y="395" width="80" height="2" fill="#E11E26"/>
</svg>
